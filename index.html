  <script>
    // ===== Constants =====
    const SUPABASE_URL = 'https://dnyfcamtyszwyqctjois.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_P5XMkx7kq2yzvHXp8uTZ2Q_vxqoGWIy';
    const START_DATE = '2026-06-01';
    const TOTAL_WEEKS = 16;
    const LS = {
      me: 'papergym:me',
      tabsVisited: 'papergym:tabs-visited',
      notes: 'papergym:notes'
    };

    // ===== Init Supabase =====
    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== State =====
    let me = JSON.parse(localStorage.getItem(LS.me) || 'null');
    let curriculum = null;

    // ===== Date вЖТ Week/Day mapping =====
    function getCurrentWeekAndDay() {
      const start = new Date(START_DATE + 'T00:00:00');
      // мЛЬлЃђл†ИмЭімЕШ: ?date=YYYY-MM-DD л°Ь к∞АмГБ лВ†мІЬ лѓЄл¶ђл≥ікЄ∞
      const simDate = new URLSearchParams(location.search).get('date');
      const now = simDate ? new Date(simDate + 'T12:00:00') : new Date();
      const diffDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return { week: 0, day: 0, status: 'before-start' };
      const week = Math.floor(diffDays / 7) + 1;
      if (week > TOTAL_WEEKS) return { week: TOTAL_WEEKS, day: 7, status: 'after-end' };
      const dayOfWeek = diffDays % 7; // 0 = мЫФ, 1 = нЩФ, ..., 5 = нЖ†, 6 = мЭЉ
      return { week, day: dayOfWeek + 1, status: 'in-progress' };
    }

    // ===== лѓЄл¶ђл≥ікЄ∞ nav (?date= URL нММлЭЉлѓЄнД∞ м°∞мЮС) =====
    function navDay(delta) {
      const cur = new URLSearchParams(location.search).get('date');
      const base = cur ? new Date(cur + 'T12:00:00') : new Date();
      base.setDate(base.getDate() + delta);
      const y = base.getFullYear();
      const m = String(base.getMonth()+1).padStart(2,'0');
      const d = String(base.getDate()).padStart(2,'0');
      location.search = `?date=${y}-${m}-${d}`;
    }
    function navWeek(delta) { navDay(delta * 7); }
    function navClear() { location.search = ''; }
    function navToFirstDay() { location.search = `?date=${START_DATE}`; }
    function fmtDay(date) {
      const m = date.getMonth()+1, d = date.getDate();
      const dow = ['мЭЉ','мЫФ','нЩФ','мИШ','л™©','кЄИ','нЖ†'][date.getDay()];
      return `${m}/${d} ${dow}`;
    }

    // ===== Supabase wrappers =====
    async function dbUpsertMember() {
      if (!me) return;
      await supa.from('papergym_members').upsert({
        user_id: me.userId, name: me.name, emoji: me.emoji, joined_at: me.joinedAt
      });
    }
    async function dbCompleteDay(week, day, answer) {
      if (!me) return;
      await supa.from('papergym_progress').upsert({
        user_id: me.userId, week, day_index: day,
        completed_at: new Date().toISOString(),
        answer: (answer || '').trim() || null
      });
    }
    async function dbFetchAnswers(week, day) {
      const [{ data: progress }, { data: members }] = await Promise.all([
        supa.from('papergym_progress')
          .select('user_id, answer')
          .eq('week', week).eq('day_index', day),
        supa.from('papergym_members').select('user_id, name, emoji')
      ]);
      const memberMap = {};
      (members || []).forEach(m => { memberMap[m.user_id] = m; });
      return (progress || [])
        .map(p => ({
          userId: p.user_id,
          name: memberMap[p.user_id]?.name || 'мЭµл™Е',
          emoji: memberMap[p.user_id]?.emoji || 'рЯС§',
          answer: (p.answer || '').trim(),
          isMe: me && p.user_id === me.userId
        }));
    }
    async function dbSendCheer(toUserId, emoji, week) {
      if (!me) return;
      // Spec accepts duplicate cheers (UI prevents most via вЬУ feedback). No dedup constraint.
      await supa.from('papergym_cheers').insert({
        from_user: me.userId, to_user: toUserId, emoji, week, sent_at: new Date().toISOString()
      });
    }
    async function dbFetchTeam() {
      const [{ data: members }, { data: progress }, { data: cheers }] = await Promise.all([
        supa.from('papergym_members').select('*'),
        supa.from('papergym_progress').select('user_id, week, day_index'),
        supa.from('papergym_cheers').select('to_user, emoji')
      ]);
      const byUser = {};
      (members || []).forEach(m => {
        byUser[m.user_id] = {
          ...m, week: 0, day: 0,
          completedDays: 0, consecutiveStreak: 0,
          progressDays: [], cheers: {}
        };
      });
      // userл≥Д progress кЈЄл£є
      const userProgress = {};
      (progress || []).forEach(p => {
        (userProgress[p.user_id] = userProgress[p.user_id] || []).push({ week: p.week, day: p.day_index });
      });
      for (const [uid, rows] of Object.entries(userProgress)) {
        const u = byUser[uid]; if (!u) continue;
        u.progressDays = rows;
        // мµЬмЛ† (week, day_index)
        const latest = rows.reduce((a, b) => (b.week > a.week || (b.week === a.week && b.day > a.day)) ? b : a, rows[0]);
        u.week = latest.week;
        u.day = latest.day;
        // completedDays: нПЙмЭЉ(M-F) progress нЦЙ мИШ
        const weekdays = rows.filter(r => r.day >= 1 && r.day <= 5);
        u.completedDays = weekdays.length;
        // consecutiveStreak: мµЬмЛ† нПЙмЭЉлґАнД∞ к±∞кЊЄл°Ь мЧ∞мЖН мєімЪінКЄ (м£Љ к≤љк≥Д W{n}D5вЖТW{n+1}D1 мЭЄм†Х)
        weekdays.sort((a, b) => b.week - a.week || b.day - a.day);
        let streak = weekdays.length ? 1 : 0;
        for (let i = 1; i < weekdays.length; i++) {
          const cur = weekdays[i-1], prev = weekdays[i];
          const consec = (cur.week === prev.week && cur.day === prev.day + 1) ||
                         (cur.week === prev.week + 1 && cur.day === 1 && prev.day === 5);
          if (consec) streak++; else break;
        }
        u.consecutiveStreak = streak;
      }
      (cheers || []).forEach(c => {
        const u = byUser[c.to_user]; if (!u) return;
        u.cheers[c.emoji] = (u.cheers[c.emoji] || 0) + 1;
      });
      return Object.values(byUser);
    }
    async function flushPending() {
      const pending = JSON.parse(localStorage.getItem('papergym:pending') || '[]');
      if (!pending.length) return;
      const remaining = [];
      for (const p of pending) {
        p.retries = (p.retries || 0) + 1;
        if (p.retries > 3) {
          console.warn('Dropping pending after 3 retries:', p);
          continue;
        }
        try {
          if (p.kind === 'complete') await dbCompleteDay(p.week, p.day, p.answer);
        } catch { remaining.push(p); }
      }
      localStorage.setItem('papergym:pending', JSON.stringify(remaining));
    }

    // ===== Router =====
    function route() {
      const hash = location.hash || '#today';
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      const target = document.getElementById('view-' + hash.slice(1));
      if (target) target.classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('bg-stone-900', b.dataset.route === hash);
        b.classList.toggle('text-white', b.dataset.route === hash);
      });
    }
    window.addEventListener('hashchange', () => {
      route();
      if (location.hash === '#today') renderToday();
      if (location.hash === '#papers') renderPapers();
      if (location.hash === '#team') renderTeam();
    });
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.addEventListener('click', () => location.hash = b.dataset.route);
    });

    // ===== First-time modal =====
    let pickedEmoji = null;
    async function showNameModal() {
      const existingDiv = document.getElementById('modal-existing-members');
      const titleEl = document.getElementById('modal-title');
      const subtitleEl = document.getElementById('modal-subtitle');
      // мЧРлЯђ л©ФмЛЬмІА reset
      const errDiv = document.getElementById('modal-name-error');
      errDiv.classList.add('hidden'); errDiv.textContent = '';

      if (me) {
        // нОЄмІС л™®лУЬ вАФ кЄ∞м°і л©§л≤Д мДємЕШ мИ®кєА
        titleEl.textContent = 'вЬПпЄП нФДл°ЬнХД мИШм†Х';
        subtitleEl.textContent = 'мЭіл¶Дк≥Љ мЭіл™®мІАл•Љ л∞ФкњА мИШ мЮИмЦімЪФ. мІДлПДлКФ кЈЄлМАл°Ь мЬ†мІАлР©лЛИлЛ§.';
        existingDiv.innerHTML = '';
      } else {
        // мЛ†кЈЬ л™®лУЬ вАФ DBмЧРмДЬ кЄ∞м°і л©§л≤Д fetchнХімДЬ "л≥ЄмЭЄ м∞ЊкЄ∞" л¶ђмК§нКЄ лЕЄмґЬ
        titleEl.textContent = 'рЯСЛ м≤ШмЭМ мШ§мЕ®лД§мЪФ';
        subtitleEl.textContent = 'нМАмЧР нХ©л•ШнХімДЬ 16м£Љ мљФмК§л•Љ нХ®кїШ мЩДм£ЉнХіліРмЪФ.';
        existingDiv.innerHTML = '<div class="text-xs text-stone-400 mb-2">лґИлЯђмШ§лКФ м§С...</div>';
        try {
          const { data: ms } = await supa.from('papergym_members')
            .select('user_id, name, emoji, joined_at')
            .order('joined_at', { ascending: true });
          if (ms && ms.length) {
            existingDiv.innerHTML = `
              <div class="bg-stone-50 border border-stone-200 rounded-lg p-3 mb-3">
                <div class="text-xs text-stone-600 font-medium mb-2">вЬУ мЭілѓЄ лУ±л°ЭнХЬ м†Б мЮИлЛ§л©і л≥ЄмЭЄ нБіл¶≠:</div>
                <div class="flex flex-wrap gap-1.5">
                  ${ms.map(m => `
                    <button data-uid="${escapeHtml(m.user_id)}" data-name="${escapeHtml(m.name)}" data-emoji="${escapeHtml(m.emoji)}" data-joined="${escapeHtml(m.joined_at || '')}" class="existing-member-btn flex items-center gap-1.5 bg-white border border-stone-300 rounded-lg px-2 py-1 hover:bg-amber-50 hover:border-amber-400 transition-colors">
                      <span class="text-lg">${escapeHtml(m.emoji)}</span>
                      <span class="text-sm font-medium">${escapeHtml(m.name)}</span>
                    </button>
                  `).join('')}
                </div>
              </div>
              <div class="text-center text-xs text-stone-400 mb-3">вФА м≤ШмЭМмЭіл©і мХДлЮШмЧР мЮЕл†• вФА</div>
            `;
            // л≥ЄмЭЄ л≥µкµђ click
            document.querySelectorAll('.existing-member-btn').forEach(btn => {
              btn.addEventListener('click', () => {
                me = {
                  name: btn.dataset.name,
                  emoji: btn.dataset.emoji,
                  userId: btn.dataset.uid,
                  joinedAt: btn.dataset.joined || new Date().toISOString()
                };
                localStorage.setItem(LS.me, JSON.stringify(me));
                document.getElementById('me-badge').textContent = me.emoji;
                hideNameModal();
                showToast(`рЯСЛ лЛ§мЛЬ лІМлВШмДЬ л∞Шк∞АмЫМмЪФ, ${me.name}!`);
                if (location.hash === '#team') renderTeam();
              });
            });
          } else {
            existingDiv.innerHTML = '';
          }
        } catch {
          existingDiv.innerHTML = '';
        }
      }
      document.getElementById('modal-name').classList.remove('hidden');
    }
    function hideNameModal() {
      document.getElementById('modal-name').classList.add('hidden');
    }
    document.querySelectorAll('.emoji-pick').forEach(btn => {
      btn.addEventListener('click', () => {
        pickedEmoji = btn.dataset.emoji;
        document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('bg-amber-100','border-amber-500'));
        btn.classList.add('bg-amber-100','border-amber-500');
        checkSaveEnabled();
      });
    });
    document.getElementById('me-badge').addEventListener('click', () => {
      if (me) {
        document.getElementById('modal-name-input').value = me.name;
        pickedEmoji = me.emoji;
        document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('bg-amber-100','border-amber-500'));
        const cur = document.querySelector(`.emoji-pick[data-emoji="${me.emoji}"]`);
        if (cur) cur.classList.add('bg-amber-100','border-amber-500');
        checkSaveEnabled();
      }
      showNameModal();
    });
    document.getElementById('modal-name-input').addEventListener('input', checkSaveEnabled);
    function checkSaveEnabled() {
      const name = document.getElementById('modal-name-input').value.trim();
      document.getElementById('modal-save').disabled = !(name && pickedEmoji);
    }
    document.getElementById('modal-save').addEventListener('click', async () => {
      const name = document.getElementById('modal-name-input').value.trim();
      const errDiv = document.getElementById('modal-name-error');
      errDiv.classList.add('hidden'); errDiv.textContent = '';
      const isNew = !me;

      // мЛ†кЈЬ лУ±л°Э мЛЬ мЭіл¶Д м§Сл≥µ м≤інБђ (case-insensitive)
      if (isNew) {
        try {
          const { data: existing } = await supa.from('papergym_members').select('name');
          const dup = (existing || []).some(m => (m.name || '').trim().toLowerCase() === name.toLowerCase());
          if (dup) {
            errDiv.textContent = 'вЪ†пЄП мЭі мЭіл¶ДмЭА мЭілѓЄ мВђмЪ© м§С. лЛ§л•Є мЭіл¶ДмЬЉл°Ь лУ±л°ЭнХШк±∞лВШ, мЬДмЧРмДЬ л≥ЄмЭЄмЭД м∞ЊмХДм£ЉмДЄмЪФ.';
            errDiv.classList.remove('hidden');
            return;
          }
        } catch { /* м≤інБђ мЛ§нМ®нХШл©і кЈЄлГ• мІДнЦЙ (лД§нКЄмЫМнБђ лБКкєА лМАлєД) */ }
      } else if (name.toLowerCase() !== (me.name || '').toLowerCase()) {
        // нОЄмІС л™®лУЬмЧРмДЬ мЭіл¶Д л∞ФкЊЄлКФ к≤љмЪ∞лПД лЛ§л•Є мВђлЮМк≥Љ м§Сл≥µ м≤інБђ
        try {
          const { data: existing } = await supa.from('papergym_members').select('user_id, name');
          const dup = (existing || []).some(m => m.user_id !== me.userId && (m.name || '').trim().toLowerCase() === name.toLowerCase());
          if (dup) {
            errDiv.textContent = 'вЪ†пЄП мЭі мЭіл¶ДмЭА лЛ§л•Є л©§л≤Дк∞А мВђмЪ© м§СмЭімЧРмЪФ. лЛ§л•Є мЭіл¶ДмЭД к≥®лЭЉм£ЉмДЄмЪФ.';
            errDiv.classList.remove('hidden');
            return;
          }
        } catch {}
      }

      me = {
        name,
        emoji: pickedEmoji,
        userId: isNew ? crypto.randomUUID() : me.userId,
        joinedAt: isNew ? new Date().toISOString() : me.joinedAt
      };
      localStorage.setItem(LS.me, JSON.stringify(me));
      try {
        await dbUpsertMember();
      } catch (e) {
        console.error('Failed to save profile to DB:', e);
        showToast('вЪ†пЄП нФДл°ЬнХД м†АмЮ• мЛ§нМ® вАФ мЮ†мЛЬ нЫД мЮРлПЩ лПЩкЄ∞нЩФ');
      }
      document.getElementById('me-badge').textContent = pickedEmoji;
      hideNameModal();
      if (location.hash === '#team') renderTeam();
    });

    // ===== #today render =====
    async function renderToday() {
      const view = document.getElementById('view-today');
      const { week, day, status } = getCurrentWeekAndDay();
      const simDate = new URLSearchParams(location.search).get('date');
      const currentDate = simDate ? new Date(simDate + 'T12:00:00') : new Date();

      // лѓЄл¶ђл≥ікЄ∞ nav (л™®лУ† status к≥µнЖµ мГБлЛ®)
      const simBanner = simDate ? `
        <div class="bg-amber-50 border border-amber-200 rounded p-2 mb-3 text-xs text-amber-900 flex justify-between items-center gap-2">
          <span>рЯСБ лѓЄл¶ђл≥ікЄ∞ м§С ¬Ј мЛ§м†Ь мШ§лКШмЭА ${fmtDay(new Date())}</span>
          <button onclick="navClear()" class="underline whitespace-nowrap">мШ§лКШл°Ь</button>
        </div>` : '';
      const navLabel = status === 'before-start' ? 'мЛЬмЮС м†Д' :
                       status === 'after-end' ? 'мЩДм£Љ рЯПЖ' :
                       `W${week} Day ${day} ¬Ј ${fmtDay(currentDate)}`;
      const navBar = `
        ${simBanner}
        <div class="flex items-center gap-2 mb-4 text-xs">
          <button onclick="navWeek(-1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50" title="мЭім†Д м£Љ">¬Ђ</button>
          <button onclick="navDay(-1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50">вАє мЦім†Ь</button>
          <div class="flex-1 text-center font-medium text-stone-700">${navLabel}</div>
          <button onclick="navDay(1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50">лВімЭЉ вАЇ</button>

            <span class="tracking-widest text-stone-400">${[1,2,3,4,5].map(n => n <= Math.min(day,5) ? 'вЧП' : 'вЧЛ').join(' ')}</span>
          </div>
          <h2 class="font-semibold text-base mb-1">${escapeHtml(paper.koreanTitle)}</h2>

          <p class="text-sm text-stone-700">${escapeHtml(paper.hook)}</p>
        </div>
      `;

      // нЖ†мЪФмЭЉ нАім¶И лґДкЄ∞
      if (day === 6) {
        view.innerHTML = navBar + paperBoxTop + renderSaturdayQuiz(paper);
        setupQuizInteractions(paper.saturdayQuiz || []);
        return;
      }

      const today = paper.days.find(d => d.n === day);
      if (!today) {
        view.innerHTML = navBar + paperBoxTop + `<p class="text-stone-500">мШ§лКШ мКђл°ѓ лН∞мЭінД∞к∞А лєДмЦімЮИмЦімЪФ</p>`;
        return;
      }

      // мІДлПД vs мЛЬк∞Д лґИмЭЉмєШ вАФ л≥ЄмЭЄ лІИмІАлІЙ мІДлПД нЩХмЭЄ (spec ¬І8.4)
      let behindBanner = '';
      if (me) {
        try {
          const { data: myProgress } = await supa.from('papergym_progress')
            .select('week, day_index')
            .eq('user_id', me.userId)
            .order('week', { ascending: false })

          if (myProgress && myProgress.length) {
            const last = myProgress[0];
            if (week - last.week >= 1 && last.day_index < 5) {
              const nextDay = last.day_index + 1;
              // л≥ЄмЭЄ лЛ§мЭМ мКђл°ѓмЭШ мЛ§м†Ь лВ†мІЬ к≥ДмВ∞
              const startDate = new Date(START_DATE + 'T12:00:00');
              startDate.setDate(startDate.getDate() + (last.week - 1) * 7 + (nextDay - 1));
              const y = startDate.getFullYear();
              const m = String(startDate.getMonth() + 1).padStart(2, '0');
              const d = String(startDate.getDate()).padStart(2, '0');

                  <div class="text-blue-900 mb-2">рЯМњ нМАмЭА <b>W${week}</b> мІДнЦЙ м§С. л≥ЄмЭЄмЭА <b>W${last.week} Day ${last.day_index}</b>кєМмІА мЩДл£М вАФ лґАлЛі к∞ЦмІА лІРк≥† л≥ЄмЭЄ нОШмЭімК§л°Ь мЭімЦік∞АлПД OK.</div>
                  <a href="?date=${nextSlotDate}#today" class="inline-block text-xs font-semibold bg-blue-600 text-white rounded-lg px-3 py-2 hover:bg-blue-700 transition-colors">вЦґ W${last.week} Day ${nextDay} мЭімЦімДЬ л≥ікЄ∞</a>
                </div>`;
            }
          }
        } catch {}
      }

      // 5нГ≠ мєілУЬ л†МлНФ
      const visited = JSON.parse(localStorage.getItem(LS.tabsVisited) || '{}');
      const slotKey = `w${week}d${day}`;
      const v = visited[slotKey] || {};
      const tabs = ['нХЩмКµлЕЄнКЄ','кЈЄл¶Љ','мЪ©мЦі','лєДмЬ†','мІИлђЄ'];
      const tabKeys = ['ko','figure','glossary','analogy','question'];
      const tabIcons = ['рЯУЦ','рЯЦЉпЄП','рЯФ§','рЯМЙ','рЯТ≠'];
      let currentTab = 'ko';

      view.innerHTML = `
        ${navBar}
        ${paperBoxTop}

            <span class="text-xs">5к∞Ь нГ≠ л™®лСР лСШлЯђл≥іл©і мЩДл£М вЬУ</span>
          </div>
          <div class="p-4">
            <div class="mb-4 bg-stone-50 rounded-lg p-3 border-l-4 ${phaseBorderTop}">
              <div class="text-xs text-stone-500 mb-0.5 flex items-center gap-1"><span>рЯУН</span><span>мШ§лКШ мЭљлКФ лґАлґД</span></div>

      // нГ≠ мєілУЬ нХЬ мєЄ HTML вАФ active(к≤Ам†Х raised) / visited(нЪМмГЙ вЬУ) / new(нЭ∞мГЙ amber нЕМлСРл¶ђ + new л∞∞мІА)
      function tabBtnHtml(label, key, icon) {
        const isActive = currentTab === key;
        const isVisited = !!v[key];
        const base = 'tab-btn relative px-1 py-2.5 rounded-xl text-center transition-all duration-150 cursor-pointer';
        let state, badge = '';
        if (isActive) {
          state = 'bg-stone-900 text-white shadow-lg scale-[1.04] ring-2 ring-stone-300 ring-offset-1';
        } else if (isVisited) {

          badge = '<span class="absolute top-1 right-1.5 text-[10px] text-green-600 font-bold">вЬУ</span>';
        } else {
          state = 'bg-white text-stone-900 border-2 border-amber-300 shadow-sm hover:bg-amber-50 hover:shadow-md hover:-translate-y-0.5 hover:border-amber-400';
          badge = '<span class="absolute -top-1.5 -right-1.5 bg-amber-400 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold leading-none shadow">new</span>';

        return `<button data-tab="${key}" class="${base} ${state}">

      }
      function renderTabStrip() {
        document.getElementById('tab-strip').innerHTML = tabs.map((label, i) => tabBtnHtml(label, tabKeys[i], tabIcons[i])).join('');
      }

      // нГ≠ мљШнЕРмЄ† л†МлНФ нХ®мИШ
      function renderTabBody(key) {
        const body = document.getElementById('tab-body');
        if (key === 'ko') body.innerHTML = renderProse(today.translationKo, weekInfo.phaseColor);
        else if (key === 'figure') body.innerHTML = `
          <div class="bg-stone-50 rounded-lg p-4 border border-stone-200">
            <div class="flex items-center gap-2 mb-3">

          <div class="space-y-2">
            ${today.glossary.map(g => `
              <div class="bg-white border border-stone-200 rounded-lg p-3 hover:shadow-md hover:-translate-y-0.5 transition-all">
                <div class="flex items-baseline justify-between gap-2 mb-1 flex-wrap">
                  <span class="font-bold text-base text-stone-900 font-mono">${escapeHtml(g.en)}</span>
                  <span class="text-sm text-stone-700 font-medium">${escapeHtml(g.ko)}</span>
                </div>
                <p class="text-xs text-stone-500 leading-relaxed">${mdInline(g.memo)}</p>
              </div>
            `).join('')}
          </div>
        `;
        else if (key === 'analogy') body.innerHTML = `
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-3">
            <div class="text-xs text-amber-700 mb-1 flex items-center gap-1"><span>рЯМЙ</span><span>мШ§лКШмЭШ лєДмЬ†</span></div>
            <p class="font-semibold text-base text-amber-900 leading-snug">${escapeHtml(today.analogy.title)}</p>
          </div>
          <div class="text-sm leading-relaxed">${renderProse(today.analogy.body, weekInfo.phaseColor)}</div>

        else if (key === 'question') body.innerHTML = `
          <div class="bg-stone-900 text-white rounded-lg p-4 mb-4">
            <div class="text-xs text-stone-400 mb-1 flex items-center gap-1"><span>рЯТ≠</span><span>мШ§лКШмЭШ мІИлђЄ</span></div>
            <p class="text-base font-semibold leading-relaxed">${mdInline(today.question)}</p>
          </div>

          <div class="mb-1.5 flex items-center justify-between">
            <span class="text-xs text-stone-600 font-medium">лВі лЛµл≥А</span>
            <span id="answer-count" class="text-xs text-stone-400">0мЮР</span>
          </div>
          <textarea id="answer-input" class="w-full border border-stone-300 rounded-lg p-3 text-sm focus:border-stone-900 focus:ring-1 focus:ring-stone-900 outline-none transition-colors" rows="4" placeholder="нХЬ лђЄмЮ•мЭіл©і мґ©лґДнХімЪФ. кЄЄк≤М мХИ мН®лПД OK."></textarea>
          <p class="text-xs text-stone-400 mt-1.5 flex items-center gap-1"><span>рЯС•</span><span>"мШ§лКШ мЩДл£М" лИДл•іл©і лПЩл£М 4л™ЕмЧРк≤М к≥µк∞ЬлПЉмЪФ</span></p>

          <div id="peer-answers" class="mt-5"></div>
        `;
        // Answer л≥µмЫР + м†АмЮ• + кЄАмЮР мИШ мєімЪінД∞ (localStorage = мЮЕл†• м§С мГИл°Ьк≥†мє® л≥µмЫРмЪ©)
        if (key === 'question') {
          const notes = JSON.parse(localStorage.getItem(LS.notes) || '{}');
          const noteKey = `w${week}d${day}`;
          const input = document.getElementById('answer-input');
          const countEl = document.getElementById('answer-count');
          input.value = notes[noteKey] || '';
          const updateCount = () => { countEl.textContent = `${input.value.length}мЮР`; };
          updateCount();
          input.addEventListener('input', () => {
            notes[noteKey] = input.value;
            localStorage.setItem(LS.notes, JSON.stringify(notes));
            updateCount();
          });
          renderPeerAnswers(week, day);
        }
      }

      // нГ≠ нБіл¶≠ (мЭіл≤§нКЄ мЬДмЮД вАФ re-render нЫДмЧРлПД лПЩмЮС)
      document.getElementById('tab-strip').addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (!btn) return;
        const key = btn.dataset.tab;
        currentTab = key;
        v[key] = true;
        visited[slotKey] = v;
        localStorage.setItem(LS.tabsVisited, JSON.stringify(visited));
        renderTabStrip();
        renderTabBody(key);
        document.getElementById('complete-btn').disabled = !tabKeys.every(k => v[k]);
      });

      // м≤Ђ нГ≠ мЮРлПЩ нЩЬмД±
      v['ko'] = true;
      visited[slotKey] = v;
      localStorage.setItem(LS.tabsVisited, JSON.stringify(visited));
      renderTabStrip();
      renderTabBody('ko');

      // мЩДл£М л≤ДнКЉ вАФ Supabase sync + offline queue
      document.getElementById('complete-btn').disabled = !tabKeys.every(k => v[k]);
      document.getElementById('complete-btn').addEventListener('click', async () => {
        const answer = (document.getElementById('answer-input')?.value || '').trim();
        try {
          await dbCompleteDay(week, day, answer);
          showToast('вЬУ мЩДл£М! рЯФ• мЭСмЫРмЭі лПДм∞©нХ† к±∞мШИмЪФ');
          // мІИлђЄ нГ≠мЧР мЮИмЬЉл©і лПЩл£М лЛµл≥А м¶ЙмЛЬ лЕЄмґЬ
          if (document.getElementById('peer-answers')) renderPeerAnswers(week, day);
        } catch (e) {
          // мШ§нФДлЭЉмЭЄ нБР (answer нПђнХ®)

          localStorage.setItem('papergym:pending', JSON.stringify(pending));
          showToast('вЪ†пЄП мШ§нФДлЭЉмЭЄ вАФ мЮ†мЛЬ нЫД мЮРлПЩ лПЩкЄ∞нЩФ');
        }
      });
    }

    // ===== Peer answers (мІИлђЄ нГ≠, л≥ЄмЭЄ мЩДл£М нЫД лЕЄмґЬ) =====
    async function renderPeerAnswers(week, day) {
      const container = document.getElementById('peer-answers');
      if (!container) return;
      let answers = [];
      try { answers = await dbFetchAnswers(week, day); } catch { return; }
      const meAnswered = answers.some(a => a.isMe && a.answer);
      if (!meAnswered) {
        container.innerHTML = `<div class="bg-stone-50 border border-stone-200 rounded p-3 text-xs text-stone-500">вЬУ мШ§лКШ мЩДл£Мл•Љ лИДл•іл©і лПЩл£МмЭШ лЛµл≥АмЭі л≥імЧђмЪФ</div>`;
        return;
      }
      const peers = answers.filter(a => !a.isMe && a.answer);
      if (peers.length === 0) {
        container.innerHTML = `<div class="bg-stone-50 border border-stone-200 rounded p-3 text-xs text-stone-500">мХДмІБ лПЩл£М лЛµл≥АмЭі мЧЖмЦімЪФ. м≤Ђ лЛµл≥АмЭімЧРмЪФ! рЯОЙ</div>`;
        return;
      }
      container.innerHTML = `
        <div class="text-xs font-semibold text-stone-500 mb-2">вАФ лПЩл£М лЛµл≥А ${peers.length}к∞Ь вАФ</div>
        <div class="space-y-2">
          ${peers.map(a => `
            <div class="border border-stone-200 rounded p-3 text-sm bg-white">
              <div class="text-xs text-stone-500 mb-1">${escapeHtml(a.emoji)} ${escapeHtml(a.name)}</div>
              <div class="whitespace-pre-wrap">${escapeHtml(a.answer)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // ===== нЖ†мЪФмЭЉ лѓЄлЛИ нАім¶И =====

    function setupQuizInteractions(quiz) {
      const totalQ = quiz.length;
      const answered = {};
      const scoreEl = document.getElementById('quiz-score');
      document.querySelectorAll('.quiz-opt').forEach(btn => {
        btn.addEventListener('click', () => {
          const qi = parseInt(btn.dataset.qi);
          if (answered[qi] !== undefined) return; // мЭілѓЄ лЛµнХЬ лђЄм†ЬлКФ мЮ†кЄИ
          const oi = parseInt(btn.dataset.oi);
          const correct = parseInt(btn.dataset.correct);
          const isRight = oi === correct;
          answered[qi] = isRight;
          const qDiv = document.querySelector(`[data-q-block="${qi}"]`);
          qDiv.querySelectorAll('.quiz-opt').forEach((b, i) => {
            b.disabled = true;
            b.classList.remove('hover:bg-stone-50');
            if (i === correct) {
              b.classList.add('bg-green-50','border-green-500','text-green-900','font-semibold');
            } else if (i === oi) {
              b.classList.add('bg-red-50','border-red-300','text-red-900');
            } else {
              b.classList.add('opacity-50');
            }
          });
          const explain = qDiv.querySelector('.quiz-explain');
          explain.classList.remove('hidden');
          explain.classList.add(isRight ? 'bg-green-50' : 'bg-amber-50', isRight ? 'text-green-900' : 'text-amber-900');
          explain.innerHTML = (isRight ? 'вЬУ м†ХлЛµ! ' : 'вЬЧ м†ХлЛµмЭА міИл°Э л∞ХмК§. ') + mdBold(quiz[qi].explain);
          const total = Object.keys(answered).length;
          const correctCount = Object.values(answered).filter(x => x).length;
          if (total === totalQ) {
            scoreEl.textContent = `рЯУК ${correctCount} / ${totalQ} м†ХлЛµ${correctCount === totalQ ? ' вАФ мЩДл≤љ! рЯПЖ' : ''}`;
            scoreEl.classList.add(correctCount === totalQ ? 'text-green-700' : 'text-stone-800');
          } else {
            scoreEl.textContent = `мІДнЦЙ ${total} / ${totalQ}`;
          }
        });
      });
    }

    function escapeHtml(s) {
      return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    // **bold** вЖТ <b>bold</b>. HTML escape first so user content stays safe.
    function mdBold(s) {
      return escapeHtml(s).replace(/\*\*([^*\n]+?)\*\*/g, '<b>$1</b>');
    }

    // мЭЄлЭЉмЭЄ: **term** вЖТ лЕЄлЮА нХШмЭілЭЉмЭінКЄ (нХЩмКµлЕЄнКЄ л≥ЄлђЄмЪ©)
    function mdInline(s) {
      return escapeHtml(s).replace(/\*\*([^*\n]+?)\*\*/g, '<mark class="bg-yellow-200 px-1 rounded font-semibold text-stone-900">$1</mark>');
    }

    // нХЩмКµлЕЄнКЄ л≥ЄлђЄ нТА л†МлНФлЯђ вАФ лЛ®лПЕнЦЙ нЧ§лФ©=phase л∞ХмК§, "л∞Ьк≤ђ N/нХЬ м£Љ нХµмЛђ" лУ±=рЯТ° callout, лґИл¶њ=мГЙ dot, мЭЄлЭЉмЭЄ bold=нХШмЭілЭЉмЭінКЄ
    function renderProse(text, phaseColor) {
      const tint = {
        amber: { bg: 'bg-amber-50', border: 'border-amber-400', text: 'text-amber-900', dot: 'text-amber-500' },
        rose:  { bg: 'bg-rose-50',  border: 'border-rose-400',  text: 'text-rose-900',  dot: 'text-rose-500' },
        emerald: { bg: 'bg-emerald-50', border: 'border-emerald-400', text: 'text-emerald-900', dot: 'text-emerald-500' },
        violet: { bg: 'bg-violet-50', border: 'border-violet-400', text: 'text-violet-900', dot: 'text-violet-500' }
      }[phaseColor] || { bg: 'bg-stone-50', border: 'border-stone-400', text: 'text-stone-900', dot: 'text-stone-500' };

      // "л∞Ьк≤ђ N", "нХЬ м£Љ нХµмЛђ", "мЩЬ W{n}мЧР мЭљлВШ" лУ± callout нВ§мЫМлУЬ
      const calloutRe = /^(л∞Ьк≤ђ \d+|нХµмЛђ л©ФмЛЬмІА|нХЬ м£Љ нХµмЛђ|нХЬ м§Д нХµмЛђ|мЩЬ W\d+мЧР мЭљлВШ|мЖФмІБнХЬ нХЬк≥Д|к≥Дл≥і мЧ∞к≤∞|мШ§лКШлВ† лПДкµђ мЧ∞к≤∞|TL;DR|м§СмЪФнХЬ м£ЉмЭШ мВђнХ≠)/;

      return text.split('\n\n').map(rawPara => {
        const para = rawPara.trim();
        if (!para) return '';

        // 1) лЛ®лПЕнЦЙ нЧ§лФ© (paragraphк∞А м†ХнЩХнЮИ **...** нХШлВШ) вЖТ phase л∞ХмК§
        const headOnly = para.match(/^\*\*([^*\n]+)\*\*$/);
        if (headOnly) {
          return `
            <div class="${tint.bg} ${tint.border} border-l-4 rounded-r-lg px-4 py-2.5 my-4 flex items-center gap-2">
              <span class="text-base">рЯУЦ</span>
              <span class="${tint.text} font-bold text-[15px]">${escapeHtml(headOnly[1])}</span>
            </div>
          `;
        }

        // 2) callout: м≤Ђ нЖ†нБ∞мЭі **л∞Ьк≤ђ 1: ...** нШХнГЬмЭік≥† нВ§мЫМлУЬ лІ§мє≠
        const calloutHead = para.match(/^\*\*([^*\n]+?)\*\*([\s\S]*)$/);
        if (calloutHead && calloutRe.test(calloutHead[1])) {
          const header = calloutHead[1];
          const body = calloutHead[2].replace(/^[:.\s]+/, '');
          return `
            <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 my-3">
              <div class="font-bold text-amber-900 text-sm flex items-center gap-1.5 mb-1.5">рЯТ° ${escapeHtml(header)}</div>
              <div class="text-stone-800 text-sm leading-relaxed">${mdInline(body)}</div>
            </div>
          `;
        }

        // 3) лґИл¶њ л¶ђмК§нКЄ (л™®лУ† нЦЙмЭі "- "л°Ь мЛЬмЮС)
        const lines = para.split('\n');
        if (lines.every(l => /^- /.test(l.trim()))) {
          return `<ul class="my-2 space-y-1.5">${lines.map(line => `
            <li class="flex gap-2"><span class="${tint.dot} flex-shrink-0 font-bold">вЧП</span><span class="flex-1">${mdInline(line.replace(/^- /, ''))}</span></li>
          `).join('')}</ul>`;
        }

        // 4) мЭЉл∞Ш лђЄлЛ® вАФ м§Дл∞ФкњИмЭА <br>л°Ь л≥ім°і
        return `<p class="my-2.5 leading-relaxed">${mdInline(para).replace(/\n/g, '<br>')}</p>`;
      }).join('');
    }

          korean: core ? (paperKoreanTitle[n.id] || n.id) : (supp ? supp.koreanTitle : n.title),

        }];

      // мЭЄм†С лІµ
      const outgoing = {}, incoming = {};
      lineage.edges.forEach(e => {
        (outgoing[e.from] = outgoing[e.from] || []).push({ id: e.to, kind: e.kind });
        (incoming[e.to] = incoming[e.to] || []).push({ id: e.from, kind: e.kind });

        return;
      }
      // л≥ЄмЭЄмЭі DBмЧР мХДмІБ мЧЖк±∞лВШ мЭСлЛµмЧР лє†м°МмЬЉл©і мЮДмЛЬ мґФк∞А
      if (me && !members.find(m => m.user_id === me.userId)) {
        members.push({
          user_id: me.userId, name: me.name, emoji: me.emoji,
          week: 0, day: 0, completedDays: 0, consecutiveStreak: 0,
          progressDays: [], cheers: {}
        });
      }

      const emojis = ['рЯФ•','рЯТ™','рЯСП','вЭ§пЄП'];
      const todayJs = new Date();
      const isSunday = todayJs.getDay() === 0;
      const { week: curWeek, day: curDay, status } = getCurrentWeekAndDay();
      const TOTAL_WEEKDAYS = TOTAL_WEEKS * 5;

      // Phase мГЙмГБ (м£Љм∞®л≥Д)
      const phaseColorByWeek = (n) => {
        if (!curriculum) return 'stone';
        const w = curriculum.weeks.find(w => w.n === n);
        return w ? w.phaseColor : 'stone';
      };
      const phaseFillClass = {
        amber: 'bg-amber-400', rose: 'bg-rose-400',
        emerald: 'bg-emerald-400', violet: 'bg-violet-400', stone: 'bg-stone-300'
      };

      // нМА мІСк≥Д
      const teamTotalDone = members.reduce((sum, m) => sum + m.completedDays, 0);
      const teamCapacity = TOTAL_WEEKDAYS * Math.max(members.length, 1);
      const teamProgressPct = Math.round((teamTotalDone / teamCapacity) * 100);

      // м†Хл†ђ: л≥ЄмЭЄ л®Љм†А, кЈЄлЛ§мЭМ мІДлПД лІОмЭА мИЬ
      const sortedMembers = [...members].sort((a, b) => {
        if (me) {
          if (a.user_id === me.userId) return -1;
          if (b.user_id === me.userId) return 1;
        }
        return (b.completedDays || 0) - (a.completedDays || 0);
      });

      const memberCard = (m) => {
        const isMe = me && m.user_id === me.userId;
        const pct = Math.round((m.completedDays / TOTAL_WEEKDAYS) * 100);
        // 16м£Љ phase dot вАФ л≥ЄмЭЄмЭі мЩДм£ЉнХЬ м£ЉлКФ phase мГЙмЬЉл°Ь кљЙ, мІДнЦЙм§СмЭЄ м£ЉлКФ day/5 лІМнБЉ
        const weekDots = Array.from({length: TOTAL_WEEKS}, (_, i) => {
          const wn = i + 1;
          const filled = wn < m.week ? 1 : (wn === m.week ? Math.min(m.day, 5) / 5 : 0);
          const pc = phaseColorByWeek(wn);
          const isCurWeek = wn === curWeek;
          return `<div class="flex-1 h-4 rounded-sm overflow-hidden bg-stone-200 relative ${isCurWeek ? 'ring-1 ring-stone-900 ring-offset-1' : ''}" title="W${wn}">

        // мЭіл≤И м£Љ 5мЭЉ dots вАФ л≥ЄмЭЄ progressDaysмЧР (curWeek, d) мЮИмЬЉл©і мГЙ
        const dayDots = Array.from({length: 5}, (_, i) => {

          const done = (m.progressDays || []).some(p => p.week === curWeek && p.day === dn);

        }).join('');
        // л≥ЄмЭЄ вАФ мШ§лКШ мКђл°ѓ done мЧђлґА + CTA / streak к≤љк≥†
        let cta = '', warning = '';
        if (isMe && status === 'in-progress') {
          const todayWeekday = curDay >= 1 && curDay <= 5;
          const todayDone = (m.progressDays || []).some(p => p.week === curWeek && p.day === curDay);
          if (todayWeekday && todayDone) {
            cta = `<div class="text-xs text-green-700 font-semibold bg-green-50 border border-green-200 rounded-lg px-3 py-2 text-center mt-3">вЬУ мШ§лКШ лґДлЯЙ(W${curWeek} Day ${curDay}) мЩДл£М</div>`;
          } else if (todayWeekday) {
            cta = `<a href="#today" class="block text-xs font-semibold bg-stone-900 text-white rounded-lg px-3 py-2 text-center hover:bg-stone-700 transition-colors mt-3">вЦґ мШ§лКШмЭШ мДЄнКЄ мЛЬмЮС (W${curWeek} Day ${curDay})</a>`;
            if (m.consecutiveStreak >= 2) {
              warning = `<div class="text-xs text-amber-800 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 mt-2 flex items-center gap-1.5">вЪ†пЄП <span>мШ§лКШ мХИ нХШл©і рЯФ•${m.consecutiveStreak}мЭЉ мЧ∞мЖНмЭі лБКк≤®мЪФ</span></div>`;
            }
          } else if (curDay === 6) {
            cta = `<a href="#today" class="block text-xs font-semibold bg-amber-500 text-white rounded-lg px-3 py-2 text-center hover:bg-amber-600 transition-colors mt-3">рЯУЭ нЖ†мЪФмЭЉ вАФ мЭіл≤И м£Љ нАім¶И</a>`;

          }
        }
        // л∞ЫмЭА мЭСмЫР
        const cheersStr = Object.entries(m.cheers || {}).map(([e,n]) => `${e}${n}`).join(' ');
        // мЭСмЫР л≥ілВікЄ∞ л≤ДнКЉ (лВ®)
        const cheerBtns = !isMe ? `<div class="flex gap-1.5 mt-3 justify-end">${emojis.map(e => `
          <button data-to="${escapeHtml(m.user_id)}" data-emoji="${e}" class="cheer-btn text-base px-2.5 py-1 border border-stone-200 rounded-lg hover:bg-amber-50 hover:border-amber-400 hover:shadow-sm transition-all">${e}</button>
        `).join('')}</div>` : '';

        return `
          <div class="border ${isMe ? 'border-stone-900 border-2 shadow-md' : 'border-stone-200'} rounded-xl p-4 bg-white">
            <div class="flex items-center gap-3 mb-3">
              <span class="text-3xl">${escapeHtml(m.emoji)}</span>
              <div class="flex-1 min-w-0">
                <div class="font-bold text-base flex items-center gap-2 flex-wrap">
                  ${escapeHtml(m.name)}
                  ${isMe ? '<span class="text-[10px] bg-stone-900 text-white px-1.5 py-0.5 rounded font-bold">лВШ</span>' : ''}
                </div>
                <div class="text-xs text-stone-500 mt-0.5">мµЬкЈЉ W${m.week} Day ${m.day} ¬Ј рЯФ• ${m.consecutiveStreak}мЭЉ мЧ∞мЖН</div>
              </div>
              <div class="text-right">
                <div class="text-xl font-bold text-stone-900">${pct}%</div>
                <div class="text-[10px] text-stone-400">${m.completedDays}/${TOTAL_WEEKDAYS}мЭЉ</div>
              </div>
            </div>

            <!-- 16м£Љ phase dot row -->
            <div class="mb-3">
              <div class="text-[10px] text-stone-400 mb-1 flex justify-between"><span>W1</span><span>W16</span></div>
              <div class="flex gap-0.5 items-end">${weekDots}</div>
            </div>

            <!-- мЭіл≤И м£Љ 5мЭЉ dots -->
            <div class="text-xs text-stone-500 flex items-center gap-2 mb-1">
              <span>мЭіл≤И м£Љ (W${curWeek}):</span>
              <span class="tracking-widest">${dayDots}</span>
            </div>

            ${cheersStr ? `<div class="text-xs text-stone-500 mt-2">л∞ЫмЭА мЭСмЫР: ${cheersStr}</div>` : ''}
            ${cheerBtns}
            ${cta}
            ${warning}
          </div>
        `;
      };

      view.innerHTML = `
        ${isSunday ? `
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-4">
            <p class="font-semibold text-amber-900 mb-1">рЯЧУпЄП мЭЉмЪФмЭЉ вАФ мЭіл≤И м£Љ мЪФмХљ + лЛ§мЭМ м£Љ нФДл¶ђлЈ∞</p>
            <p class="text-sm text-amber-800">мЭіл≤И м£Љ лИДк∞А л©∞мє† мЩДм£ЉнЦИлКФмІА нХЬ лИИмЧР л≥ік≥†, лПЩл£МмЧРк≤М мЭСмЫР л≥ілВікЄ∞ мҐЛмЭА мЛЬк∞Д</p>
          </div>
        ` : ''}

        <!-- нМА мЪФмХљ нЧ§лНФ (к≤Ам†Х gradient) -->
        <div class="bg-gradient-to-br from-stone-900 to-stone-700 text-white rounded-xl p-5 mb-4">
          <div class="text-xs text-stone-400 mb-1">рЯТ™ нХ®кїШнХШлКФ нМА ${members.length}л™Е ¬Ј 16м£Љ мљФмК§</div>
          <div class="text-2xl font-bold mb-3">${status === 'before-start' ? 'мЛЬмЮС м†Д (6мЫФ 1мЭЉ мЛЬмЮС)' : status === 'after-end' ? 'рЯПЖ 16м£Љ мЩДм£Љ!' : `нШДмЮђ W${curWeek} Day ${curDay}`}</div>
          <div class="bg-stone-700/50 rounded-full h-2 overflow-hidden mb-2">
            <div class="bg-emerald-400 h-full transition-all" style="width:${teamProgressPct}%"></div>
          </div>
          <div class="text-xs text-stone-300">нМА м†Дм≤і ${teamProgressPct}% ¬Ј ${teamTotalDone}мЭЉ / ${teamCapacity}мЭЉ мЩДл£М</div>

        <div class="space-y-3">
          ${sortedMembers.map(memberCard).join('')}

      document.querySelectorAll('.cheer-btn').forEach(btn => {
        btn.addEventListener('click', async () => {

    // ===== Boot =====
    // localStorage meк∞А DBмЩА мЭЉмєШнХШлКФмІА к≤Ам¶Э. лґИмЭЉмєШ мЛЬ reset(лЛ§л•Є лФФл∞ФмЭімК§/syncл°Ь мШЫ лН∞мЭінД∞к∞А л∞ХнЮМ к≤љмЪ∞ л≥інШЄ)
    async function verifyMe() {
      if (!me) return;
      try {
        const { data } = await supa.from('papergym_members')
          .select('user_id, name, emoji')
          .eq('user_id', me.userId)
          .maybeSingle();
        if (!data) {
          // DBмЧР л≥ЄмЭЄ row мЧЖмЭМ вАФ DB л¶ђмЕЛлРРк±∞лВШ, мШЫ мВђмЪ©мЮР лН∞мЭінД∞к∞А лЛ§л•Є лФФл∞ФмЭімК§мЧРмДЬ syncлР®
          localStorage.removeItem(LS.me);
          me = null;
          setTimeout(() => showToast('рЯФД мШЫ мВђмЪ©мЮР м†Хл≥ік∞А мЮИмЦі міИкЄ∞нЩФнЦИмЦімЪФ. лЛ§мЛЬ лУ±л°ЭнХім£ЉмДЄмЪФ.'), 200);
          return;
        }
        // к∞ЩмЭА user_idл©і DBк∞А мІДмЛ§ вАФ мЭіл¶Д¬ЈмЭіл™®мІА лґИмЭЉмєШ мЛЬ reset лМАмЛ† meл•Љ DBл°Ь sync
        // (лЛ§л•Є лФФл∞ФмЭімК§мЧРмДЬ нФДл°ЬнХД л≥Ак≤љнХЬ к≤љмЪ∞ мЮРлПЩ л∞ШмШБ)
        const dbName = (data.name || '').trim().toLowerCase();
        const meName = (me.name || '').trim().toLowerCase();
        if (dbName !== meName || data.emoji !== me.emoji) {
          me.name = data.name;
          me.emoji = data.emoji;
          localStorage.setItem(LS.me, JSON.stringify(me));
          setTimeout(() => showToast('рЯФД лЛ§л•Є лФФл∞ФмЭімК§мЧРмДЬ л≥Ак≤љнХЬ нФДл°ЬнХДмЭД лПЩкЄ∞нЩФнЦИмЦімЪФ'), 200);
        }
      } catch (e) {
        // лД§нКЄмЫМнБђ мЛ§нМ® вАФ мШЫ me мЬ†мІА (мШ§нФДлЭЉмЭЄ л™®лУЬ л≥імЮ•)
        console.warn('verifyMe failed (network?), keeping local me', e);
      }
    }

        return;
      }
      // me к≤Ам¶Э вАФ DBмЧР л≥ЄмЭЄ rowк∞А мЮИк≥† мЭЉмєШнХШлКФмІА (лЛ§л•Є лФФл∞ФмЭімК§/syncл°Ь мШЫ лН∞мЭінД∞ л∞ХнЮМ к≤љмЪ∞ л≥інШЄ)
      await verifyMe();
      // мШ§нФДлЭЉмЭЄ нБР retry (me мВімХДмЮИмЭД лХМлІМ)
      if (me) await flushPending();
      if (!me) {
        showNameModal();
      } else {
        document.getElementById('me-badge').textContent = me.emoji;
      }
      if (!location.hash) location.hash = '#today';
      route();
      if (location.hash === '#papers') renderPapers();
      else if (location.hash === '#team') renderTeam();
      else renderToday();
    }
    boot();
  </script>
</body>
</html>
