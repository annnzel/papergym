<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaperGym — AI 논문 16주 스터디</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/cytoscape@3.28.0/dist/cytoscape.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; }
  </style>
</head>
<body class="bg-stone-50 text-stone-900">

  <!-- Header -->
  <header class="border-b border-stone-200 bg-white sticky top-0 z-10">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="font-semibold">📚 PaperGym</div>
      <nav class="flex gap-1 text-sm">
        <button data-route="#today" class="nav-btn px-3 py-1 rounded">📖 오늘</button>
        <button data-route="#papers" class="nav-btn px-3 py-1 rounded">🗂️ 논문</button>
        <button data-route="#team" class="nav-btn px-3 py-1 rounded">👥 팀</button>
      </nav>
      <button id="me-badge" class="text-2xl">🦊</button>
    </div>
  </header>

  <!-- Views -->
  <main class="max-w-3xl mx-auto px-4 py-6">
    <div id="view-today" class="view"></div>
    <div id="view-papers" class="view hidden"></div>
    <div id="view-team" class="view hidden"></div>
  </main>

  <!-- First-time modal -->
  <div id="modal-name" class="hidden fixed inset-0 bg-black/40 z-20 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-6 max-w-sm w-full">
      <h2 class="text-lg font-semibold mb-1">👋 처음 오셨네요</h2>
      <p class="text-sm text-stone-600 mb-4">팀 4명이 응원할 수 있게 이름과 이모지를 골라주세요.</p>
      <label class="block text-xs text-stone-500 mb-1">이름</label>
      <input id="modal-name-input" type="text" class="w-full border border-stone-300 rounded px-3 py-2 mb-3" maxlength="10" placeholder="예: Ann">
      <label class="block text-xs text-stone-500 mb-1">이모지</label>
      <div id="modal-emoji-row" class="flex gap-2 mb-4">
        <button data-emoji="🦊" class="emoji-pick text-2xl border border-stone-300 rounded px-3 py-2">🦊</button>
        <button data-emoji="🐻" class="emoji-pick text-2xl border border-stone-300 rounded px-3 py-2">🐻</button>
        <button data-emoji="🐯" class="emoji-pick text-2xl border border-stone-300 rounded px-3 py-2">🐯</button>
        <button data-emoji="🐰" class="emoji-pick text-2xl border border-stone-300 rounded px-3 py-2">🐰</button>
      </div>
      <button id="modal-save" class="w-full bg-stone-900 text-white rounded py-2 disabled:bg-stone-400" disabled>저장하고 시작</button>
    </div>
  </div>

  <script>
    // ===== Constants =====
    const SUPABASE_URL = 'https://dnyfcamtyszwyqctjois.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_P5XMkx7kq2yzvHXp8uTZ2Q_vxqoGWIy';
    const START_DATE = '2026-06-01';
    const TOTAL_WEEKS = 16;
    const LS = {
      me: 'papergym:me',
      tabsVisited: 'papergym:tabs-visited',
      notes: 'papergym:notes'
    };

    // ===== Init Supabase =====
    const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ===== State =====
    let me = JSON.parse(localStorage.getItem(LS.me) || 'null');
    let curriculum = null;

    // ===== Date → Week/Day mapping =====
    function getCurrentWeekAndDay() {
      const start = new Date(START_DATE + 'T00:00:00');
      // 시뮬레이션: ?date=YYYY-MM-DD 로 가상 날짜 미리보기
      const simDate = new URLSearchParams(location.search).get('date');
      const now = simDate ? new Date(simDate + 'T12:00:00') : new Date();
      const diffDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return { week: 0, day: 0, status: 'before-start' };
      const week = Math.floor(diffDays / 7) + 1;
      if (week > TOTAL_WEEKS) return { week: TOTAL_WEEKS, day: 7, status: 'after-end' };
      const dayOfWeek = diffDays % 7; // 0 = 월, 1 = 화, ..., 5 = 토, 6 = 일
      return { week, day: dayOfWeek + 1, status: 'in-progress' };
    }

    // ===== 미리보기 nav (?date= URL 파라미터 조작) =====
    function navDay(delta) {
      const cur = new URLSearchParams(location.search).get('date');
      const base = cur ? new Date(cur + 'T12:00:00') : new Date();
      base.setDate(base.getDate() + delta);
      const y = base.getFullYear();
      const m = String(base.getMonth()+1).padStart(2,'0');
      const d = String(base.getDate()).padStart(2,'0');
      location.search = `?date=${y}-${m}-${d}`;
    }
    function navWeek(delta) { navDay(delta * 7); }
    function navClear() { location.search = ''; }
    function navToFirstDay() { location.search = `?date=${START_DATE}`; }
    function fmtDay(date) {
      const m = date.getMonth()+1, d = date.getDate();
      const dow = ['일','월','화','수','목','금','토'][date.getDay()];
      return `${m}/${d} ${dow}`;
    }

    // ===== Supabase wrappers =====
    async function dbUpsertMember() {
      if (!me) return;
      await supa.from('papergym_members').upsert({
        user_id: me.userId, name: me.name, emoji: me.emoji, joined_at: me.joinedAt
      });
    }
    async function dbCompleteDay(week, day, answer) {
      if (!me) return;
      await supa.from('papergym_progress').upsert({
        user_id: me.userId, week, day_index: day,
        completed_at: new Date().toISOString(),
        answer: (answer || '').trim() || null
      });
    }
    async function dbFetchAnswers(week, day) {
      const [{ data: progress }, { data: members }] = await Promise.all([
        supa.from('papergym_progress')
          .select('user_id, answer')
          .eq('week', week).eq('day_index', day),
        supa.from('papergym_members').select('user_id, name, emoji')
      ]);
      const memberMap = {};
      (members || []).forEach(m => { memberMap[m.user_id] = m; });
      return (progress || [])
        .map(p => ({
          userId: p.user_id,
          name: memberMap[p.user_id]?.name || '익명',
          emoji: memberMap[p.user_id]?.emoji || '👤',
          answer: (p.answer || '').trim(),
          isMe: me && p.user_id === me.userId
        }));
    }
    async function dbSendCheer(toUserId, emoji, week) {
      if (!me) return;
      // Spec accepts duplicate cheers (UI prevents most via ✓ feedback). No dedup constraint.
      await supa.from('papergym_cheers').insert({
        from_user: me.userId, to_user: toUserId, emoji, week, sent_at: new Date().toISOString()
      });
    }
    async function dbFetchTeam() {
      const [{ data: members }, { data: progress }, { data: cheers }] = await Promise.all([
        supa.from('papergym_members').select('*'),
        supa.from('papergym_progress').select('user_id, week, day_index'),
        supa.from('papergym_cheers').select('to_user, emoji')
      ]);
      // 사용자별 최신 주차/Day + 받은 응원 집계
      const byUser = {};
      (members || []).forEach(m => { byUser[m.user_id] = { ...m, week: 0, day: 0, streak: 0, cheers: {} }; });
      (progress || []).forEach(p => {
        const u = byUser[p.user_id]; if (!u) return;
        if (p.week > u.week || (p.week === u.week && p.day_index > u.day)) {
          u.week = p.week; u.day = p.day_index;
        }
      });
      (cheers || []).forEach(c => {
        const u = byUser[c.to_user]; if (!u) return;
        u.cheers[c.emoji] = (u.cheers[c.emoji] || 0) + 1;
      });
      // Streak = total progress row count (spec shortcut, not consecutive days).
      (progress || []).forEach(p => {
        const u = byUser[p.user_id]; if (!u) return;
        u.streak++;
      });
      return Object.values(byUser);
    }
    async function flushPending() {
      const pending = JSON.parse(localStorage.getItem('papergym:pending') || '[]');
      if (!pending.length) return;
      const remaining = [];
      for (const p of pending) {
        p.retries = (p.retries || 0) + 1;
        if (p.retries > 3) {
          console.warn('Dropping pending after 3 retries:', p);
          continue;
        }
        try {
          if (p.kind === 'complete') await dbCompleteDay(p.week, p.day, p.answer);
        } catch { remaining.push(p); }
      }
      localStorage.setItem('papergym:pending', JSON.stringify(remaining));
    }

    // ===== Router =====
    function route() {
      const hash = location.hash || '#today';
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      const target = document.getElementById('view-' + hash.slice(1));
      if (target) target.classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('bg-stone-900', b.dataset.route === hash);
        b.classList.toggle('text-white', b.dataset.route === hash);
      });
    }
    window.addEventListener('hashchange', () => {
      route();
      if (location.hash === '#today') renderToday();
      if (location.hash === '#papers') renderPapers();
      if (location.hash === '#team') renderTeam();
    });
    document.querySelectorAll('.nav-btn').forEach(b => {
      b.addEventListener('click', () => location.hash = b.dataset.route);
    });

    // ===== First-time modal =====
    let pickedEmoji = null;
    function showNameModal() {
      document.getElementById('modal-name').classList.remove('hidden');
    }
    function hideNameModal() {
      document.getElementById('modal-name').classList.add('hidden');
    }
    document.querySelectorAll('.emoji-pick').forEach(btn => {
      btn.addEventListener('click', () => {
        pickedEmoji = btn.dataset.emoji;
        document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('bg-amber-100','border-amber-500'));
        btn.classList.add('bg-amber-100','border-amber-500');
        checkSaveEnabled();
      });
    });
    document.getElementById('me-badge').addEventListener('click', () => {
      if (me) {
        document.getElementById('modal-name-input').value = me.name;
        pickedEmoji = me.emoji;
        document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('bg-amber-100','border-amber-500'));
        const cur = document.querySelector(`.emoji-pick[data-emoji="${me.emoji}"]`);
        if (cur) cur.classList.add('bg-amber-100','border-amber-500');
        checkSaveEnabled();
      }
      showNameModal();
    });
    document.getElementById('modal-name-input').addEventListener('input', checkSaveEnabled);
    function checkSaveEnabled() {
      const name = document.getElementById('modal-name-input').value.trim();
      document.getElementById('modal-save').disabled = !(name && pickedEmoji);
    }
    document.getElementById('modal-save').addEventListener('click', async () => {
      const name = document.getElementById('modal-name-input').value.trim();
      const isNew = !me;
      me = {
        name,
        emoji: pickedEmoji,
        userId: isNew ? crypto.randomUUID() : me.userId,
        joinedAt: isNew ? new Date().toISOString() : me.joinedAt
      };
      localStorage.setItem(LS.me, JSON.stringify(me));
      try {
        await dbUpsertMember();
      } catch (e) {
        console.error('Failed to save profile to DB:', e);
        showToast('⚠️ 프로필 저장 실패 — 잠시 후 자동 동기화');
      }
      document.getElementById('me-badge').textContent = pickedEmoji;
      hideNameModal();
    });

    // ===== #today render =====
    async function renderToday() {
      const view = document.getElementById('view-today');
      const { week, day, status } = getCurrentWeekAndDay();
      const simDate = new URLSearchParams(location.search).get('date');
      const currentDate = simDate ? new Date(simDate + 'T12:00:00') : new Date();

      // 미리보기 nav (모든 status 공통 상단)
      const simBanner = simDate ? `
        <div class="bg-amber-50 border border-amber-200 rounded p-2 mb-3 text-xs text-amber-900 flex justify-between items-center gap-2">
          <span>👁 미리보기 중 · 실제 오늘은 ${fmtDay(new Date())}</span>
          <button onclick="navClear()" class="underline whitespace-nowrap">오늘로</button>
        </div>` : '';
      const navLabel = status === 'before-start' ? '시작 전' :
                       status === 'after-end' ? '완주 🏆' :
                       `W${week} Day ${day} · ${fmtDay(currentDate)}`;
      const navBar = `
        ${simBanner}
        <div class="flex items-center gap-2 mb-4 text-xs">
          <button onclick="navWeek(-1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50" title="이전 주">«</button>
          <button onclick="navDay(-1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50">‹ 어제</button>
          <div class="flex-1 text-center font-medium text-stone-700">${navLabel}</div>
          <button onclick="navDay(1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50">내일 ›</button>
          <button onclick="navWeek(1)" class="border border-stone-300 rounded px-2 py-1 hover:bg-stone-50" title="다음 주">»</button>
        </div>
      `;

      if (status === 'before-start') {
        view.innerHTML = navBar + `<div class="bg-amber-50 border border-amber-200 rounded-lg p-6 text-center">
          <p class="text-amber-900 font-semibold mb-2">🏋️ 6월 1일부터 시작이에요</p>
          <p class="text-sm text-amber-700 mb-4">진짜 학습은 6/1부터. 그 전엔 미리보기로 둘러보세요.</p>
          <button onclick="navToFirstDay()" class="bg-amber-600 text-white rounded-lg px-4 py-2 text-sm font-semibold hover:bg-amber-700">📖 W1 Day 1 미리보기</button>
        </div>`;
        return;
      }
      if (status === 'after-end') {
        view.innerHTML = navBar + `<div class="bg-violet-50 border border-violet-200 rounded-lg p-6 text-center">
          <p class="text-violet-900 font-semibold">🏆 16주 완주! 다들 수고하셨어요</p>
        </div>`;
        return;
      }

      const weekInfo = curriculum.weeks.find(w => w.n === week);
      if (!weekInfo) return;

      // Review 주차 또는 일요일 = paper 없이 안내 카드만
      if (weekInfo.type === 'review' || day === 7) {
        view.innerHTML = navBar + renderWeekendOrReview(weekInfo, day);
        return;
      }

      // day 1~5 (평일 학습) OR day === 6 (토요일 퀴즈) — paper fetch 공통
      let paper;
      try {
        paper = await fetch(`data/papers/${weekInfo.paperId}.json`).then(r => {
          if (!r.ok) throw new Error('not-found');
          return r.json();
        });
      } catch {
        view.innerHTML = navBar + `<div class="bg-stone-100 rounded-lg p-6 text-center">
          <p class="text-stone-600">⏳ 이번 주 학습 자료가 곧 도착합니다</p>
        </div>`;
        return;
      }

      // 이번 주 논문 박스 — 평일 카드/토요일 퀴즈 위에 공통 노출
      const phaseBorderTop = {
        amber: 'border-l-amber-400', rose: 'border-l-rose-400',
        emerald: 'border-l-emerald-400', violet: 'border-l-violet-400'
      }[weekInfo.phaseColor] || 'border-l-stone-400';
      const paperBoxTop = `
        <div class="bg-white border border-stone-200 border-l-4 ${phaseBorderTop} rounded-lg p-4 mb-4">
          <div class="flex items-center justify-between mb-2 text-xs">
            <span class="font-semibold text-stone-500">📚 W${week} · 이번 주의 논문</span>
            <span class="tracking-widest text-stone-400">${[1,2,3,4,5].map(n => n <= Math.min(day,5) ? '●' : '○').join(' ')}</span>
          </div>
          <h2 class="font-semibold text-base mb-1">${escapeHtml(paper.koreanTitle)}</h2>
          <p class="text-xs text-stone-500 mb-2">${escapeHtml(paper.title)}</p>
          <p class="text-sm text-stone-700">${escapeHtml(paper.hook)}</p>
        </div>
      `;

      // 토요일 퀴즈 분기
      if (day === 6) {
        view.innerHTML = navBar + paperBoxTop + renderSaturdayQuiz(paper);
        setupQuizInteractions(paper.saturdayQuiz || []);
        return;
      }

      const today = paper.days.find(d => d.n === day);
      if (!today) {
        view.innerHTML = navBar + paperBoxTop + `<p class="text-stone-500">오늘 슬롯 데이터가 비어있어요</p>`;
        return;
      }

      // 진도 vs 시간 불일치 — 본인 마지막 진도 확인 (spec §8.4)
      let behindBanner = '';
      if (me) {
        try {
          const { data: myProgress } = await supa.from('papergym_progress')
            .select('week, day_index')
            .eq('user_id', me.userId)
            .order('week', { ascending: false })
            .order('day_index', { ascending: false })
            .limit(1);
          if (myProgress && myProgress.length) {
            const last = myProgress[0];
            if (week - last.week >= 1 && last.day_index < 5) {
              const nextDay = last.day_index + 1;
              behindBanner = `<div class="bg-blue-50 border border-blue-200 rounded p-3 mb-4 text-sm text-blue-900">한 주 쉬어가도 괜찮아요. 오늘은 W${last.week} Day ${nextDay}부터요.</div>`;
            }
          }
        } catch {}
      }

      // 5탭 카드 렌더
      const visited = JSON.parse(localStorage.getItem(LS.tabsVisited) || '{}');
      const slotKey = `w${week}d${day}`;
      const v = visited[slotKey] || {};
      const tabs = ['한국어','그림','용어','비유','질문'];
      const tabKeys = ['ko','figure','glossary','analogy','question'];

      view.innerHTML = `
        ${navBar}
        ${paperBoxTop}
        ${behindBanner}
        <div class="bg-white rounded-lg border border-stone-200 overflow-hidden">
          <div class="bg-stone-100 px-4 py-3 flex justify-between items-center text-sm text-stone-600">
            <span>📖 Day ${day} · ${['월','화','수','목','금'][day-1]}요일</span>
          </div>
          <div class="p-4">
            <h2 class="font-semibold text-base">${escapeHtml(today.range)}</h2>
            <p class="text-xs text-stone-500 mb-4">약 ${today.estimatedMinutes}분 · ${today.pages}페이지</p>

            <div class="flex border-b border-stone-200 -mx-4 px-4">
              ${tabs.map((label, i) => `
                <button data-tab="${tabKeys[i]}" class="tab-btn px-3 py-2 text-sm border-b-2 ${i === 0 ? 'border-stone-900 font-semibold' : 'border-transparent text-stone-500'}">
                  ${v[tabKeys[i]] ? '✓ ' : ''}${label}
                </button>
              `).join('')}
            </div>

            <div id="tab-body" class="py-4 text-sm leading-relaxed min-h-[120px]"></div>

            <button id="complete-btn" class="w-full mt-4 bg-green-600 disabled:bg-stone-300 text-white rounded-lg py-3 font-semibold">
              ✓ 오늘 완료
            </button>
          </div>
        </div>
      `;

      // 탭 콘텐츠 렌더 함수
      function renderTabBody(key) {
        const body = document.getElementById('tab-body');
        if (key === 'ko') body.innerHTML = `<div class="whitespace-pre-wrap">${escapeHtml(today.translationKo)}</div>`;
        else if (key === 'figure') body.innerHTML = `
          <img src="${escapeHtml(today.figure.imagePath)}" alt="figure" class="max-w-full mx-auto mb-3 border border-stone-200 rounded" onerror="this.style.display='none'">
          <p class="text-stone-700"><b>${escapeHtml(today.figure.id)}</b> — ${escapeHtml(today.figure.captionKo)}</p>
        `;
        else if (key === 'glossary') body.innerHTML = `
          <ul class="space-y-2">
            ${today.glossary.map(g => `<li><b>${escapeHtml(g.en)}</b> · ${escapeHtml(g.ko)}<br><span class="text-xs text-stone-500">${escapeHtml(g.memo)}</span></li>`).join('')}
          </ul>
        `;
        else if (key === 'analogy') body.innerHTML = `
          <p class="font-semibold mb-2">${escapeHtml(today.analogy.title)}</p>
          <p>${escapeHtml(today.analogy.body)}</p>
        `;
        else if (key === 'question') body.innerHTML = `
          <p class="font-semibold mb-2">오늘의 질문</p>
          <p class="mb-3">${escapeHtml(today.question)}</p>
          <textarea id="answer-input" class="w-full border border-stone-300 rounded p-3 text-sm" rows="4" placeholder="한 문장으로 답해보세요"></textarea>
          <p class="text-xs text-stone-400 mt-1">"오늘 완료" 누르면 동료 4명에게 공개돼요.</p>
          <div id="peer-answers" class="mt-4"></div>
        `;
        // Answer 복원 + 저장 (localStorage = 입력 중 새로고침 복원용)
        if (key === 'question') {
          const notes = JSON.parse(localStorage.getItem(LS.notes) || '{}');
          const noteKey = `w${week}d${day}`;
          const input = document.getElementById('answer-input');
          input.value = notes[noteKey] || '';
          input.addEventListener('input', () => {
            notes[noteKey] = input.value;
            localStorage.setItem(LS.notes, JSON.stringify(notes));
          });
          renderPeerAnswers(week, day);
        }
      }

      // 탭 클릭
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.remove('border-stone-900','font-semibold');
            b.classList.add('border-transparent','text-stone-500');
          });
          btn.classList.add('border-stone-900','font-semibold');
          btn.classList.remove('border-transparent','text-stone-500');
          const key = btn.dataset.tab;
          renderTabBody(key);
          // 방문 기록
          v[key] = true;
          visited[slotKey] = v;
          localStorage.setItem(LS.tabsVisited, JSON.stringify(visited));
          // ✓ 마크 업데이트
          btn.textContent = '✓ ' + tabs[tabKeys.indexOf(key)];

        });
      });

      // 첫 탭 자동 활성
      renderTabBody('ko');
      v['ko'] = true;
      visited[slotKey] = v;
      localStorage.setItem(LS.tabsVisited, JSON.stringify(visited));
      document.querySelector('[data-tab="ko"]').textContent = '✓ 한국어';

      // 완료 버튼 — Supabase sync + offline queue
      document.getElementById('complete-btn').disabled = !tabKeys.every(k => v[k]);
      document.getElementById('complete-btn').addEventListener('click', async () => {
        const answer = (document.getElementById('answer-input')?.value || '').trim();

          await dbCompleteDay(week, day, answer);

          if (document.getElementById('peer-answers')) renderPeerAnswers(week, day);
        } catch (e) {
          // 오프라인 큐 (answer 포함)
          const pending = JSON.parse(localStorage.getItem('papergym:pending') || '[]');
          pending.push({ kind: 'complete', week, day, answer, at: Date.now() });

    function setupQuizInteractions(quiz) {
      const totalQ = quiz.length;
      const answered = {};
      const scoreEl = document.getElementById('quiz-score');
      document.querySelectorAll('.quiz-opt').forEach(btn => {
        btn.addEventListener('click', () => {
          const qi = parseInt(btn.dataset.qi);
          if (answered[qi] !== undefined) return; // 이미 답한 문제는 잠금
          const oi = parseInt(btn.dataset.oi);
          const correct = parseInt(btn.dataset.correct);
          const isRight = oi === correct;
          answered[qi] = isRight;
          const qDiv = document.querySelector(`[data-q-block="${qi}"]`);
          qDiv.querySelectorAll('.quiz-opt').forEach((b, i) => {
            b.disabled = true;
            b.classList.remove('hover:bg-stone-50');
            if (i === correct) {
              b.classList.add('bg-green-50','border-green-500','text-green-900','font-semibold');
            } else if (i === oi) {
              b.classList.add('bg-red-50','border-red-300','text-red-900');
            } else {
              b.classList.add('opacity-50');
            }
          });
          const explain = qDiv.querySelector('.quiz-explain');
          explain.classList.remove('hidden');
          explain.classList.add(isRight ? 'bg-green-50' : 'bg-amber-50', isRight ? 'text-green-900' : 'text-amber-900');
          explain.textContent = (isRight ? '✓ 정답! ' : '✗ 정답은 초록 박스. ') + explain.textContent;
          const total = Object.keys(answered).length;
          const correctCount = Object.values(answered).filter(x => x).length;
          if (total === totalQ) {
            scoreEl.textContent = `📊 ${correctCount} / ${totalQ} 정답${correctCount === totalQ ? ' — 완벽! 🏆' : ''}`;
            scoreEl.classList.add(correctCount === totalQ ? 'text-green-700' : 'text-stone-800');
          } else {
            scoreEl.textContent = `진행 ${total} / ${totalQ}`;
          }
        });
      });
    }

    // ===== 29편 계보 graph (cytoscape force layout) =====
    async function renderLineageGraph() {
      const container = document.getElementById('lineage-graph');
      if (!container || typeof cytoscape === 'undefined') return;
      let lineage;
      try { lineage = await fetch('data/lineage.json').then(r => r.json()); }
      catch { container.innerHTML = '<p class="text-stone-500 p-4">계보 데이터 로드 실패</p>'; return; }

      const phaseColor = { 1: '#fbbf24', 2: '#fb7185', 3: '#34d399', 4: '#a78bfa' };
      const elements = [
        ...lineage.nodes.map(n => ({
          data: {
            id: n.id, label: n.label, title: n.title, type: n.type,
            color: phaseColor[n.phase] || '#94a3b8',
            size: n.type === 'core' ? 62 : 38
          }
        })),
        ...lineage.edges.map(e => ({
          data: { id: `${e.from}__${e.to}`, source: e.from, target: e.to, kind: e.kind }
        }))
      ];

      const cy = cytoscape({
        container, elements,
        layout: {
          name: 'cose', animate: false, nodeRepulsion: 9000,
          idealEdgeLength: 110, edgeElasticity: 80, gravity: 0.4, padding: 30
        },
        style: [
          { selector: 'node', style: {
            'label': 'data(label)', 'text-valign': 'center', 'text-halign': 'center',
            'text-wrap': 'wrap', 'font-size': 10, 'font-weight': 700,
            'color': '#1f2937', 'background-color': 'data(color)',
            'width': 'data(size)', 'height': 'data(size)',
            'border-width': 2, 'border-color': '#ffffff',
            'transition-property': 'opacity, border-width, border-color',
            'transition-duration': 150
          }},
          { selector: 'node[type="supp"]', style: {
            'background-opacity': 0.55, 'border-style': 'dashed',
            'border-color': '#64748b', 'font-size': 9, 'font-weight': 500
          }},
          { selector: 'edge', style: {
            'width': 1.5, 'line-color': '#cbd5e1',
            'target-arrow-shape': 'triangle', 'target-arrow-color': '#cbd5e1',
            'curve-style': 'bezier', 'arrow-scale': 0.8,
            'transition-property': 'opacity, line-color, target-arrow-color, width',
            'transition-duration': 150
          }},
          { selector: 'edge[kind="ext"]', style: { 'line-style': 'dashed' } },
          { selector: '.faded', style: { 'opacity': 0.15 } },
          { selector: 'node.highlighted', style: {
            'border-width': 4, 'border-color': '#f59e0b'
          }},
          { selector: 'edge.highlighted', style: {
            'line-color': '#f59e0b', 'target-arrow-color': '#f59e0b', 'width': 2.5
          }}
        ]
      });

      cy.on('tap', 'node', evt => {
        const n = evt.target;
        cy.elements().removeClass('faded highlighted');
        cy.elements().difference(n.closedNeighborhood()).addClass('faded');
        n.closedNeighborhood().addClass('highlighted');
      });
      cy.on('tap', evt => {
        if (evt.target === cy) cy.elements().removeClass('faded highlighted');
      });
    }

          <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-4">
            <p class="font-semibold text-amber-900 mb-1">🗓️ 일요일 — 이번 주 요약</p>
            <p class="text-sm text-amber-800">이번 주 누가 며칠 완주, 다음 주 논문 프리뷰</p>
          </div>
        ` : ''}

        <h1 class="text-xl font-semibold mb-4">팀 ${mockMembers.length}명 · ${(mockMembers.length && mockMembers[0].week) ? 'W' + mockMembers[0].week : '시작 전'}</h1>
        <div class="space-y-2">
          ${mockMembers.map(m => {
            const isMe = me && m.userId === me.userId;
            return `
              <div class="flex items-center gap-3 p-3 border border-stone-200 rounded-lg bg-white text-sm">
                <div class="text-2xl">${escapeHtml(m.emoji)}</div>
                <div class="font-semibold min-w-[55px]">${escapeHtml(m.name)}</div>
                <div class="flex-1">
                  <div class="bg-stone-200 h-1.5 rounded overflow-hidden">
                    <div class="bg-green-600 h-full" style="width:${(m.day / 5) * 100}%"></div>
                  </div>
                  <div class="text-xs text-stone-500 mt-1">W${m.week} D${m.day} / 5</div>
                </div>
                <div class="text-xs text-red-600 min-w-[35px] text-right">🔥${m.streak}</div>
                ${isMe ? `
                  <div class="text-xs text-stone-400">받은 ${Object.entries(m.cheers).map(([e,n]) => `${e}${n}`).join(' ') || '0'}</div>
                ` : emojis.map(e => `
                  <button data-to="${escapeHtml(m.userId)}" data-emoji="${e}" class="cheer-btn text-base px-2 py-1 border border-transparent rounded hover:bg-amber-50 hover:border-amber-400">${e}</button>
                `).join('')}
              </div>
            `;
          }).join('')}
        </div>
      `;

      document.querySelectorAll('.cheer-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const week = curriculum ? getCurrentWeekAndDay().week : 1;
          try {
            await dbSendCheer(btn.dataset.to, btn.dataset.emoji, week);
            btn.classList.add('bg-green-100','border-green-500');
            btn.textContent = '✓';
            setTimeout(() => renderTeam(), 1500);
          } catch {
            showToast('⚠️ 응원 전송 실패 — 잠시 후 다시 시도해주세요');
          }
        });
      });
    }

    // ===== Boot =====
    async function boot() {
      try {
        const res = await fetch('data/curriculum.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        curriculum = await res.json();
      } catch (err) {
        console.error('Curriculum load failed:', err);
        document.querySelector('main').innerHTML = `
          <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
            <p class="text-red-900 font-semibold mb-1">데이터를 불러오지 못했어요</p>
            <p class="text-sm text-red-700">잠시 후 새로고침해 주세요. (data/curriculum.json)</p>
          </div>`;
        return;
      }
      // 오프라인 큐 retry
      if (me) await flushPending();
      if (!me) {
        showNameModal();
      } else {
        document.getElementById('me-badge').textContent = me.emoji;
      }
      if (!location.hash) location.hash = '#today';
      route();
      if (location.hash === '#papers') renderPapers();
      else if (location.hash === '#team') renderTeam();
      else renderToday();
    }
    boot();
  </script>
</body>
</html>
